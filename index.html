<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>백야: 일몰과 일출 사이</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="overlay">
      <div class="profile-wrap">
        <div class="profile-image">로고뭐하지</div>
        <div>
          <p class="eyebrow">Veni, Vidi, Vici !</p>
          <h1 id="game-title"></h1>
          <p id="game-subtitle"></p>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-page="home">HOME</button>
    <button class="tab" data-page="characters">CHARACTERS</button>
    <button class="tab" data-page="chapters">CHAPTERS</button>
    <button class="tab" data-page="timeline">TIMELINE</button>
  </nav>

  <main class="container">
    <section id="home" class="page active-page">
      <div class="stats" id="stats"></div>
      <section class="panel">
        <h2>소개</h2>
        <p id="game-intro"></p>
      </section>
      <section class="panel">
        <h2>최근 기록</h2>
        <div id="recent-list" class="card-list"></div>
      </section>
    </section>

    <section id="characters" class="page">
      <div class="section-head">
        <h2>등장인물</h2>
        <div id="character-filters" class="filters"></div>
      </div>
      <div id="character-list" class="grid"></div>
    </section>

    <section id="chapters" class="page">
      <h2>챕터</h2>
      <div id="chapter-list" class="card-list"></div>
    </section>

    <section id="timeline" class="page">
      <h2>타임라인</h2>
      <div id="timeline-list" class="timeline"></div>
    </section>
  </main>

  <footer>
    <p>개인 게임 기록 페이지 · GitHub Pages</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
